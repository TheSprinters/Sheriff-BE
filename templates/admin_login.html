{% extends "layouts/base.html" %}

{% block head %}
<style>
    body { background: linear-gradient(135deg, #0f1c2e 0%, #1e3a5f 100%); min-height: 100vh; }
    .login-card {
        max-width: 420px;
        margin: 80px auto;
        padding: 2.5rem;
        background: rgba(22, 42, 70, 0.95);
        border: 1px solid rgba(251, 191, 36, 0.4);
        border-radius: 14px;
        box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    }
    .login-card h2 { color: #fbbf24; font-weight: 700; }
    .login-card p  { color: #94a3b8; font-size: .9rem; }
    .form-control {
        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.15);
        color: #e2e8f0;
    }
    .form-control:focus {
        background: rgba(255,255,255,0.12);
        border-color: #fbbf24;
        box-shadow: 0 0 0 .2rem rgba(251,191,36,.25);
        color: #fff;
    }
    .form-label { color: #cbd5e1; }
    .btn-admin {
        background: linear-gradient(135deg, #f59e0b, #d97706);
        border: none; color: #1e3a5f; font-weight: 700;
        padding: 12px; border-radius: 8px; width: 100%;
        transition: all .3s;
    }
    .btn-admin:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(245,158,11,.35); }
    .badge-admin { background: #dc2626; color: #fff; font-size:.7rem; padding:3px 8px; border-radius:4px; }
    #msg { display:none; padding:10px; border-radius:6px; margin-top:12px; font-size:.9rem; }
    #msg.error   { background:rgba(220,38,38,.2);  border:1px solid #dc2626; color:#fca5a5; }
    #msg.success { background:rgba(16,185,129,.2); border:1px solid #10b981; color:#6ee7b7; }
</style>
{% endblock %}

{% block body %}
<div class="container">
    <div class="login-card">
        <div class="text-center mb-4">
            <span class="badge-admin">ADMIN ONLY</span>
            <h2 class="mt-3 mb-1">Admin Portal</h2>
            <p>DSA User Management System</p>
        </div>

        <form id="adminLoginForm">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" class="form-control" id="uid" placeholder="admin username" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-admin">Sign In to Admin Panel</button>
        </form>

        <div id="msg"></div>

        <div class="text-center mt-4">
            <a href="/" style="color:#60a5fa; font-size:.85rem;">← Back to Main Site</a>
        </div>
    </div>
</div>

<script>
document.getElementById('adminLoginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const msg = document.getElementById('msg');
    msg.style.display = 'none';

    const uid      = document.getElementById('uid').value.trim();
    const password = document.getElementById('password').value;

    try {
        const res = await fetch('/api/sheriff/authenticate', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            credentials: 'include',
            body: JSON.stringify({uid, password})
        });
        const data = await res.json();

        if (!res.ok) {
            msg.className = 'error';
            msg.textContent = data.message || 'Login failed';
            msg.style.display = 'block';
            return;
        }

        // Verify admin role
        if (!data.user || data.user.role !== 'Admin') {
            msg.className = 'error';
            msg.textContent = 'Access denied — Admin role required.';
            msg.style.display = 'block';
            return;
        }

        msg.className = 'success';
        msg.textContent = 'Login successful! Redirecting…';
        msg.style.display = 'block';
        setTimeout(() => window.location.href = '/admin-panel', 800);

    } catch (err) {
        msg.className = 'error';
        msg.textContent = 'Network error. Is the server running?';
        msg.style.display = 'block';
    }
});
</script>
{% endblock %}

{% block background %}{% endblock %}
